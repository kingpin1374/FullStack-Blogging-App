apiVersion: apps/v1
kind: Deployment
metadata:
  # FIXED: Matches the 'blogging-app-deployment' name in your Jenkinsfile
  name: blogging-app-deployment
spec:
  selector:
    matchLabels:
      app: bloggingapp
  replicas: 2
  template:
    metadata:
      labels:
        app: bloggingapp
    spec:
      containers:
        - name: bloggingapp
          # FIXED: Matches the DOCKER_IMAGE variable in your pipeline
          image: amandevops001/blogging-app:latest 
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
      # FIXED: Indentation (imagePullSecrets must be at the same level as containers)
      imagePullSecrets:
        - name: regcred 
---
apiVersion: v1
kind: Service
metadata:
  name: bloggingapp-ssvc
spec:
  selector:
    app: bloggingapp
  ports:
    - protocol: "TCP"
      port: 80
      targetPort: 8080 
  type: LoadBalancer
